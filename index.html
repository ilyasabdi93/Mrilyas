<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuthFlow AI — Smarter Authentication</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #060b1a;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== BACKGROUND IMAGE ===== */
        .bg-image {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: url('https://i.ibb.co/spmtTqHm/922bbd40d371ae8ae360ea3bc4510e4c.jpg') center center / cover no-repeat;
            filter: brightness(0.35) saturate(1.1);
            transform: scale(1.05);
            animation: slowZoom 25s ease-in-out infinite alternate;
        }

        @keyframes slowZoom {
            from { transform: scale(1.05); }
            to { transform: scale(1.12); }
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: linear-gradient(135deg, rgba(6, 11, 26, 0.85) 0%, rgba(6, 11, 26, 0.4) 40%, rgba(6, 11, 26, 0.7) 100%);
            pointer-events: none;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image:
                linear-gradient(rgba(99, 102, 241, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .bg-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 1;
        }

        .bg-glow-1 {
            width: 600px;
            height: 600px;
            background: rgba(99, 102, 241, 0.08);
            top: -150px;
            right: -150px;
            animation: glowFloat 18s ease-in-out infinite;
        }

        .bg-glow-2 {
            width: 500px;
            height: 500px;
            background: rgba(249, 115, 22, 0.04);
            bottom: -100px;
            left: -100px;
            animation: glowFloat 22s ease-in-out infinite reverse;
        }

        @keyframes glowFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -40px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(40px, 30px) scale(1.02); }
        }

        /* ===== NAVIGATION ===== */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 60px;
            max-width: 1440px;
            margin: 0 auto;
            background: rgba(6, 11, 26, 0.5);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.3px;
            color: #ffffff;
        }

        .logo .logo-icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #fff;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.2);
        }

        .logo span {
            background: linear-gradient(135deg, #818cf8, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 36px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.55);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #6366f1, #4f46e5);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: #ffffff;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .search-btn:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.2);
            color: #818cf8;
        }

        .hamburger {
            display: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .hamburger:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.2);
            color: #818cf8;
        }

        /* ===== HERO SECTION ===== */
        .hero {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1440px;
            margin: 0 auto;
            padding: 120px 60px 80px;
            gap: 60px;
            min-height: 100vh;
        }

        /* ===== LEFT: BLUE HORSE IN MOTION ===== */
        .hero-visual {
            flex: 1.1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .horse-scene {
            width: 100%;
            max-width: 620px;
            position: relative;
        }

        .horse-scene svg {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 30px 80px rgba(99, 102, 241, 0.2));
        }

        .horse-scene::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 65%);
            border-radius: 50%;
            pointer-events: none;
        }

        .ground-glow {
            position: absolute;
            bottom: 8%;
            left: 5%;
            right: 5%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(249, 115, 22, 0.2), rgba(249, 115, 22, 0.1), transparent);
            filter: blur(4px);
            pointer-events: none;
        }

        /* Orange sparks */
        .particles-container {
            position: absolute;
            bottom: 5%;
            left: 0;
            right: 0;
            height: 120px;
            pointer-events: none;
            overflow: visible;
        }

        .spark {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #f97316;
            box-shadow: 0 0 6px rgba(249, 115, 22, 0.4), 0 0 12px rgba(249, 115, 22, 0.15);
            animation: sparkFloat var(--duration) ease-out infinite;
            opacity: 0;
        }

        .spark:nth-child(1) { left: 10%; --duration: 2.5s; animation-delay: 0s; }
        .spark:nth-child(2) { left: 20%; --duration: 3.2s; animation-delay: 0.4s; }
        .spark:nth-child(3) { left: 30%; --duration: 2.8s; animation-delay: 0.8s; }
        .spark:nth-child(4) { left: 40%; --duration: 3.5s; animation-delay: 1.2s; }
        .spark:nth-child(5) { left: 50%; --duration: 2.3s; animation-delay: 0.2s; }
        .spark:nth-child(6) { left: 60%; --duration: 3.0s; animation-delay: 1.0s; }
        .spark:nth-child(7) { left: 70%; --duration: 2.6s; animation-delay: 0.6s; }
        .spark:nth-child(8) { left: 80%; --duration: 3.3s; animation-delay: 1.4s; }
        .spark:nth-child(9) { left: 15%; --duration: 2.9s; animation-delay: 0.9s; }
        .spark:nth-child(10) { left: 65%; --duration: 3.1s; animation-delay: 0.3s; }
        .spark:nth-child(11) { left: 35%; --duration: 2.4s; animation-delay: 1.1s; }
        .spark:nth-child(12) { left: 55%; --duration: 2.7s; animation-delay: 0.7s; }

        @keyframes sparkFloat {
            0% { transform: translateY(0) scale(1); opacity: 0.8; }
            50% { transform: translateY(-60px) scale(0.6); opacity: 0.5; }
            100% { transform: translateY(-120px) scale(0); opacity: 0; }
        }

        .spark-particle {
            position: absolute;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            background: #fb923c;
            opacity: 0.3;
            animation: particleDrift 4s ease-in-out infinite;
        }

        .spark-particle:nth-child(13) { left: 22%; top: 60%; animation-delay: 0.5s; }
        .spark-particle:nth-child(14) { left: 48%; top: 70%; animation-delay: 1.5s; }
        .spark-particle:nth-child(15) { left: 72%; top: 55%; animation-delay: 2.5s; }
        .spark-particle:nth-child(16) { left: 38%; top: 65%; animation-delay: 3.0s; }

        @keyframes particleDrift {
            0%, 100% { transform: translate(0, 0); opacity: 0.2; }
            50% { transform: translate(15px, -25px); opacity: 0.5; }
        }

        /* ===== RIGHT: TYPOGRAPHY ===== */
        .hero-content {
            flex: 0.9;
            max-width: 580px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 18px;
            border-radius: 50px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.12), rgba(79, 70, 229, 0.08));
            border: 1px solid rgba(99, 102, 241, 0.15);
            color: #818cf8;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 24px;
            backdrop-filter: blur(4px);
        }

        .pill .pill-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #818cf8;
            animation: pulseDot 2s ease-in-out infinite;
        }

        @keyframes pulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        .hero-content h1 {
            font-size: clamp(38px, 6vw, 68px);
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: -2.5px;
            margin-bottom: 16px;
        }

        .hero-content h1 .brand {
            background: linear-gradient(135deg, #818cf8 0%, #6366f1 40%, #4f46e5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-content h1 .ai {
            background: linear-gradient(135deg, #f97316, #fb923c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-content .subtitle {
            font-size: clamp(18px, 2.2vw, 24px);
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 12px;
            letter-spacing: -0.3px;
        }

        .hero-content .description {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.4);
            line-height: 1.8;
            max-width: 480px;
            margin-bottom: 32px;
        }

        .btn-learn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 36px;
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 24px rgba(249, 115, 22, 0.2), 0 0 60px rgba(249, 115, 22, 0.06);
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .btn-learn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
            transition: left 0.6s ease;
        }

        .btn-learn:hover::before {
            left: 100%;
        }

        .btn-learn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 40px rgba(249, 115, 22, 0.3), 0 0 80px rgba(249, 115, 22, 0.08);
        }

        .btn-learn i {
            font-size: 16px;
            transition: transform 0.3s ease;
        }

        .btn-learn:hover i {
            transform: translateX(4px);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            nav { padding: 16px 30px; }
            .hero { padding: 100px 30px 60px; gap: 40px; }
            .nav-links { gap: 24px; }
        }

        @media (max-width: 900px) {
            .hero {
                flex-direction: column;
                text-align: center;
                padding: 90px 24px 50px;
                gap: 30px;
            }
            .hero-content {
                max-width: 100%;
                order: 2;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .hero-content .description { max-width: 100%; }
            .hero-visual { order: 1; width: 100%; }
            .horse-scene { max-width: 420px; margin: 0 auto; }
            .hero-content h1 { font-size: 34px; letter-spacing: -1.5px; }
            .pill { margin: 0 auto 20px; }
        }

        @media (max-width: 768px) {
            nav { padding: 14px 20px; }
            .logo { font-size: 17px; }
            .logo .logo-icon { width: 28px; height: 28px; font-size: 13px; }
            .nav-links {
                display: none;
                position: fixed;
                top: 66px;
                left: 0;
                right: 0;
                background: rgba(6, 11, 26, 0.98);
                backdrop-filter: blur(24px);
                flex-direction: column;
                padding: 24px;
                gap: 18px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.04);
                z-index: 100;
            }
            .nav-links.open { display: flex; }
            .hamburger { display: flex; }
            .hero { padding: 80px 20px 40px; }
            .horse-scene { max-width: 320px; }
            .hero-content h1 { font-size: 28px; }
            .hero-content .subtitle { font-size: 17px; }
            .hero-content .description { font-size: 14px; }
            .btn-learn { padding: 14px 28px; font-size: 14px; }
        }

        @media (max-width: 480px) {
            nav { padding: 12px 16px; }
            .nav-right { gap: 6px; }
            .hero { padding: 70px 16px 30px; }
            .horse-scene { max-width: 240px; }
            .hero-content h1 { font-size: 24px; letter-spacing: -1px; }
            .hero-content .subtitle { font-size: 15px; }
            .btn-learn { padding: 12px 24px; font-size: 13px; width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <!-- ===== BACKGROUND IMAGE ===== -->
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <!-- ===== NAVIGATION ===== -->
    <nav>
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-bolt"></i></div>
            <span>Authflow</span> AI
        </div>

        <ul class="nav-links" id="navLinks">
            <li><a href="#home" class="active">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#services">Services</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>

        <div class="nav-right">
            <button class="search-btn" aria-label="Search"><i class="fas fa-search"></i></button>
            <button class="hamburger" id="hamburgerBtn" aria-label="Menu" onclick="toggleMobile()">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <!-- ===== HERO SECTION ===== -->
    <section class="hero" id="home">
        <!-- LEFT: Blue Horse in Motion -->
        <div class="hero-visual">
            <div class="horse-scene">
                <svg viewBox="0 0 520 420" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="horseBody" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stop-color="#6366f1"/>
                            <stop offset="40%" stop-color="#818cf8"/>
                            <stop offset="75%" stop-color="#4f46e5"/>
                            <stop offset="100%" stop-color="#3730a3"/>
                        </linearGradient>
                        <linearGradient id="horseHighlight" x1="0" y1="0" x2="0.3" y2="1">
                            <stop offset="0%" stop-color="#a5b4fc"/>
                            <stop offset="100%" stop-color="#6366f1"/>
                        </linearGradient>
                        <linearGradient id="horseDark" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stop-color="#4f46e5"/>
                            <stop offset="100%" stop-color="#312e81"/>
                        </linearGradient>
                        <linearGradient id="maneGrad" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stop-color="#818cf8"/>
                            <stop offset="50%" stop-color="#6366f1"/>
                            <stop offset="100%" stop-color="#4338ca"/>
                        </linearGradient>
                        <filter id="glowHorse">
                            <feGaussianBlur stdDeviation="3" result="blur"/>
                            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                        </filter>
                    </defs>

                    <!-- Body -->
                    <path d="M85 290 C60 265, 45 225, 55 185 C65 145, 95 115, 140 95
                             L185 72 L210 40 C220 22, 245 15, 265 25 C285 35, 295 55, 290 78
                             L282 100 L320 110 C355 120, 390 145, 410 180
                             C430 215, 435 250, 420 280 C405 310, 380 330, 345 340
                             L320 350 L295 325 L270 345 L245 330
                             C220 315, 195 290, 175 280 L150 295
                             C130 310, 105 310, 85 300 L75 290Z"
                          fill="url(#horseBody)" opacity="0.95" filter="url(#glowHorse)"/>

                    <!-- Head / Neck -->
                    <path d="M210 38 C195 12, 180 0, 165 -5 L215 12 L240 8 L255 25
                             C255 32, 248 40, 240 44 L225 48 L210 38Z"
                          fill="url(#horseHighlight)" opacity="0.9"/>

                    <!-- Mane -->
                    <path d="M155 65 C130 40, 105 28, 80 32 C95 52, 110 70, 125 78
                             C135 65, 145 58, 155 65Z"
                          fill="url(#maneGrad)" opacity="0.7"/>
                    <path d="M145 75 C115 50, 90 38, 65 42 C80 62, 100 80, 115 88
                             C125 75, 135 68, 145 75Z"
                          fill="url(#maneGrad)" opacity="0.5"/>
                    <path d="M165 55 C140 30, 120 18, 95 22 C110 42, 125 60, 140 68
                             C150 55, 158 48, 165 55Z"
                          fill="url(#maneGrad)" opacity="0.6"/>

                    <!-- Tail -->
                    <path d="M415 175 C440 150, 460 125, 470 135 C480 145, 455 180, 430 205
                             C445 190, 455 178, 415 175Z"
                          fill="url(#maneGrad)" opacity="0.5"/>
                    <path d="M405 190 C430 165, 450 145, 460 155 C470 165, 445 195, 420 220
                             C435 205, 445 195, 405 190Z"
                          fill="url(#maneGrad)" opacity="0.35"/>

                    <!-- Legs -->
                    <path d="M145 280 L130 365 L155 368 L168 290Z" fill="url(#horseDark)" opacity="0.85"/>
                    <path d="M210 292 L195 380 L220 382 L233 305Z" fill="url(#horseDark)" opacity="0.85"/>
                    <path d="M295 325 L280 405 L305 408 L318 335Z" fill="url(#horseDark)" opacity="0.85"/>
                    <path d="M350 325 L335 395 L360 398 L373 335Z" fill="url(#horseDark)" opacity="0.85"/>

                    <!-- Hooves -->
                    <rect x="128" y="360" width="28" height="10" rx="4" fill="#312e81" opacity="0.9"/>
                    <rect x="193" y="375" width="28" height="10" rx="4" fill="#312e81" opacity="0.9"/>
                    <rect x="278" y="400" width="28" height="10" rx="4" fill="#312e81" opacity="0.9"/>
                    <rect x="333" y="392" width="28" height="10" rx="4" fill="#312e81" opacity="0.9"/>

                    <!-- Eye -->
                    <circle cx="225" cy="28" r="5" fill="#060b1a" opacity="0.9"/>
                    <circle cx="226" cy="26" r="2" fill="#ffffff" opacity="0.7"/>

                    <!-- Ears -->
                    <path d="M200 10 L192 -8 L210 6Z" fill="url(#horseHighlight)" opacity="0.7"/>
                    <path d="M215 8 L212 -10 L228 4Z" fill="url(#horseHighlight)" opacity="0.7"/>

                    <!-- Energy glow lines -->
                    <path d="M50 200 C40 180, 35 160, 40 140" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
                    <path d="M460 200 C470 180, 475 160, 470 140" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
                    <path d="M100 350 C90 360, 80 365, 70 360" stroke="#818cf8" stroke-width="1" stroke-linecap="round" opacity="0.1"/>

                    <!-- Sparkles -->
                    <circle cx="70" cy="120" r="3" fill="#818cf8" opacity="0.25"/>
                    <circle cx="450" cy="150" r="2" fill="#818cf8" opacity="0.2"/>
                    <circle cx="380" cy="70" r="2.5" fill="#818cf8" opacity="0.15"/>
                    <circle cx="150" cy="350" r="2" fill="#818cf8" opacity="0.2"/>
                    <circle cx="400" cy="310" r="1.5" fill="#818cf8" opacity="0.15"/>

                    <!-- Energy trail -->
                    <path d="M30 250 Q15 240, 20 220" stroke="#6366f1" stroke-width="2" stroke-linecap="round" opacity="0.08" fill="none"/>
                    <path d="M490 250 Q505 240, 500 220" stroke="#6366f1" stroke-width="2" stroke-linecap="round" opacity="0.08" fill="none"/>
                </svg>

                <div class="ground-glow"></div>

                <div class="particles-container">
                    <div class="spark"></div>
                    <div class="spark"></div>
                    <div class="spark"></div>
                    <div class="spark"></div>

            nav.classList.toggle('open');
            icon.className = nav.classList.contains('open') ? 'fas fa-times' : 'fas fa-bars';
        }

        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                const nav = document.getElementById('navLinks');
                const btn = document.getElementById('hamburgerBtn');
                if (nav.classList.contains('open')) {
                    nav.classList.remove('open');
                    btn.querySelector('i').className = 'fas fa-bars';
                }
            });
        });
